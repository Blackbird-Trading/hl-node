name: "hyperliquid"

services:
  node:
    restart: unless-stopped
    build: .
    ports:
      - "4000-4010:4000-4010"
    volumes:
      - hl-data:/home/hluser/hl/data

  pruner:
    restart: unless-stopped
    build: ./pruner
    volumes:
      - hl-data:/home/hluser/hl/data


volumes:
  hl-data:
    driver: local
    driver_opts:
      type: "none"
      device: "/var/lib/docker/volumes/hl-data/_data"
      o: "bind,size=10G" # Soft enforcement depending on host OS support
