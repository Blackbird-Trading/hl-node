name: "hyperliquid"

services:
  node:
    restart: unless-stopped
    build: .
    ports:
      - "4000-4010:4000-4010"
    volumes:
      - ./hl-data:/home/hluser/hl/hyperliquid_data

  pruner:
    restart: unless-stopped
    build: ./pruner
    volumes:
      - ./hl-data:/home/hluser/hl/hyperliquid_data
